# Kanadevia English newsroom. The top newsroom page redirects; the yearly
# archive has stable server-rendered article cards.
source:
  name: kanadevia_newsroom
  url: https://www.kanadevia.com
  type: html
  strategy: html
  status: enable

request:
  timeout: 25
  headers:
    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
    Accept-Language: en-US,en;q=0.9,ja;q=0.8

list_page:
  url: https://www.kanadevia.com/english/newsroom/news/2026/
  sections:
    - name: current_year
      section_title: "Kanadevia Newsroom"
      item_selector: "article.news__article"
      link_selector: "a[href*='/english/newsroom/news/']"
      title_selector: "a[href*='/english/newsroom/news/']"
      date_selector: "time, .news__date, [class*='date']"
      tags:
        - type: section
          name: current_year
        - type: company
          name: kanadevia
        - type: language
          name: en

detail_page:
  title_selector: "h1"
  content_selector: "main [class*='content'], main, article"
  date_selector: "time, main"
  remove_selectors:
    - "script"
    - "style"
    - "nav"
    - "header"
    - "footer"
    - ".breadcrumb"
    - "[class*='share']"
    - "[class*='related']"

parse:
  date_format: "%b %d, %Y"
  timezone: Asia/Tokyo
  max_articles_per_run: 40

cleaning:
  strip_html: true
  remove_blank_lines: true
  normalize_whitespace: true
  min_content_length: 30

tagging:
  enable_rule_tagger: true
  enable_llm_tagger: false
  allowed_tag_types:
    - country
    - company
    - shipowner
    - shipyard
    - engine_maker
    - vessel_type
    - fuel_type
    - regulator
    - term
    - language

summary:
  enable: true
  mode: rule

llm:
  provider: mock
  model: mock-llm
  base_url: http://mock-llm.local
  api_key_env: MOCK_LLM_API_KEY
  timeout: 10
