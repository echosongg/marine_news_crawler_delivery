# Daihatsu Infinearth English news (/en/news/). List rows are table.pbWhatsnewTable; PDFs use *_e.pdf.
source:
  name: d_infi_news
  url: https://www.d-infi.com
  type: html
  strategy: html
  status: enable

request:
  timeout: 30
  legacy_tls_compatibility: true
  headers:
    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
    Accept-Language: en-US,en;q=0.9

list_page:
  url: https://www.d-infi.com/en/news/
  sections:
    - name: latest_news
      section_title: "Daihatsu Infinearth News"
      item_selector: "table.pbWhatsnewTable tr"
      link_selector: "td.article a[href]"
      title_selector: "td.article a"
      date_selector: "td.date"
      tags:
        - type: section
          name: latest_news
        - type: company
          name: daihatsu_infinearth
        - type: engine_maker
          name: daihatsu_infinearth
        - type: language
          name: en

detail_page:
  title_selector: "h1"
  content_selector: "main, article, .entry-content, [class*='content']"
  date_selector: "time, .date, main"
  remove_selectors:
    - "script"
    - "style"
    - "nav"
    - "header"
    - "footer"
    - ".breadcrumb"
    - "[class*='share']"
    - "[class*='related']"

parse:
  date_format: "%Y/%m/%d"
  timezone: Asia/Tokyo
  max_articles_per_run: 20

cleaning:
  strip_html: true
  remove_blank_lines: true
  normalize_whitespace: true
  min_content_length: 50

tagging:
  enable_rule_tagger: true
  enable_llm_tagger: false
  allowed_tag_types:
    - country
    - company
    - shipowner
    - shipyard
    - engine_maker
    - vessel_type
    - fuel_type
    - regulator
    - term
    - language

summary:
  enable: true
  mode: rule

llm:
  provider: mock
  model: mock-llm
  base_url: http://mock-llm.local
  api_key_env: MOCK_LLM_API_KEY
  timeout: 10
