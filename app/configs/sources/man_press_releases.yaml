source:
  name: man_press_releases
  url: https://www.man-es.com
  type: html
  strategy: html
  status: enable

request:
  timeout: 20
  headers:
    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
    Accept-Language: en-US,en;q=0.9

list_page:
  url: https://www.man-es.com/company/press-releases
  sections:
    - name: press_releases
      section_title: "Press Releases"
      item_selector: ".newslist-tiles li"
      link_selector: "h3 a[href]"
      title_selector: "h3 a[href]"
      date_selector: ".title-date"

detail_page:
  title_selector: ".press-release-detail h1.title"
  content_selector: ".press-release-detail .long-text"
  date_selector: ".press-release-detail .date"
  remove_selectors:
    - ".history-link"
    - "script"
    - "style"

parse:
  date_format: "%A, %B %d, %Y"
  timezone: UTC
  max_articles_per_run: 5

cleaning:
  strip_html: true
  remove_blank_lines: true
  normalize_whitespace: true
  min_content_length: 120

tagging:
  enable_rule_tagger: true
  enable_llm_tagger: false
  allowed_tag_types:
    - country
    - company
    - shipowner
    - shipyard
    - engine_maker
    - vessel_type
    - fuel_type
    - regulator
    - term

summary:
  enable: true
  mode: rule

llm:
  provider: mock
  model: mock-llm
  base_url: http://mock-llm.local
  api_key_env: MOCK_LLM_API_KEY
  timeout: 10
