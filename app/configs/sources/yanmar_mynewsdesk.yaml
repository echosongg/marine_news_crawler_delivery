# Yanmar corporate newsroom hosted on Mynewsdesk.
source:
  name: yanmar_mynewsdesk
  url: https://www.mynewsdesk.com/yanmar
  type: html
  strategy: html
  status: enable

request:
  timeout: 25
  headers:
    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
    Accept-Language: en-US,en;q=0.9

list_page:
  url: https://www.mynewsdesk.com/yanmar/latest_news
  sections:
    - name: latest_news
      section_title: "Yanmar News Archive"
      item_selector: "article"
      link_selector: "h2 a[href], h3 a[href], a[href*='/pressreleases/']"
      title_selector: "h2, h3"
      date_selector: "time"
      tags:
        - type: section
          name: latest_news
        - type: company
          name: yanmar
        - type: language
          name: en

detail_page:
  title_selector: "h1"
  content_selector: "main article, article"
  date_selector: "time"
  remove_selectors:
    - "script"
    - "style"
    - "nav"
    - "header"
    - "footer"
    - "[class*='share']"
    - "[class*='related']"
    - "[class*='contact']"
    - "[class*='download']"

parse:
  date_format: "%d %B %Y %H:%M"
  timezone: Asia/Tokyo
  max_articles_per_run: 30

cleaning:
  strip_html: true
  remove_blank_lines: true
  normalize_whitespace: true
  min_content_length: 80

tagging:
  enable_rule_tagger: true
  enable_llm_tagger: false
  allowed_tag_types:
    - country
    - company
    - shipowner
    - shipyard
    - engine_maker
    - vessel_type
    - fuel_type
    - regulator
    - term
    - language

summary:
  enable: true
  mode: rule

llm:
  provider: mock
  model: mock-llm
  base_url: http://mock-llm.local
  api_key_env: MOCK_LLM_API_KEY
  timeout: 10
