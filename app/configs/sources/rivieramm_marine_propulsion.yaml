source:
  name: rivieramm_marine_propulsion
  url: https://www.rivieramm.com
  type: html
  strategy: html
  status: enable

request:
  timeout: 40
  # Riviera 对程序化请求存在限流（HTTP 429），使用 Playwright 以浏览器会话加载页面
  use_playwright: true
  headers:
    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
    Accept-Language: en-US,en;q=0.9

list_page:
  # Marine Propulsion vertical page exposes Latest News and Opinion sections.
  # content types. We key candidate extraction off the final article link paths
  # instead of one shared card container so this source stays resilient when the
  # page layout shifts between topic variants.
  url: https://www.rivieramm.com/marine-propulsion--auxiliary-machinery
  sections:
    - name: latest_news
      section_title: "Latest News"
      item_selector: "div.aos-SHCi"
      link_selector: "h2.aos-ArticleTitle a[href*='/news-content-hub/']"
      title_selector: "h2.aos-ArticleTitle a[href*='/news-content-hub/']"
      date_selector: "span.aos-ArticleDate"
      tags:
        - type: section
          name: latest_news

    - name: opinion
      section_title: "Opinion"
      item_selector: "div.aos-SHCi"
      link_selector: "h2.aos-ArticleTitle a[href*='/opinion/']"
      title_selector: "h2.aos-ArticleTitle a[href*='/opinion/']"
      date_selector: "span.aos-ArticleDate"
      tags:
        - type: section
          name: opinion

detail_page:
  title_selector: "h1.aos-ArticleTitle"
  content_selector: ".aos-DS27-WYSEdit"
  date_selector: ".aos-ArticleMetaData .aos-ArticleDate"
  remove_selectors:
    - "#ao-MeteringAllow"
    - ".aos-Article-ShareLinks"
    - ".aos-sponsoredarticle"
    - "script"
    - "style"

parse:
  date_format: "%d %b %Y"
  timezone: UTC
  max_articles_per_run: 10

cleaning:
  strip_html: true
  remove_blank_lines: true
  normalize_whitespace: true
  min_content_length: 120

tagging:
  enable_rule_tagger: true
  enable_llm_tagger: false
  allowed_tag_types:
    - country
    - company
    - shipowner
    - shipyard
    - engine_maker
    - vessel_type
    - fuel_type
    - regulator
    - term

summary:
  enable: true
  mode: rule

llm:
  provider: mock
  model: mock-llm
  base_url: http://mock-llm.local
  api_key_env: MOCK_LLM_API_KEY
  timeout: 10
