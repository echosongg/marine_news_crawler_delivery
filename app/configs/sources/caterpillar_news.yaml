# Caterpillar news. The live site returns Access Denied to local httpx and
# Playwright, but the public structure is configured for environments that can
# access caterpillar.com.
source:
  name: caterpillar_news
  url: https://www.caterpillar.com
  type: html
  strategy: html
  status: disable

request:
  timeout: 45
  use_playwright: true
  headers:
    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
    Accept-Language: en-US,en;q=0.9

list_page:
  url: https://www.caterpillar.com/en/news/corporate-press-releases.html
  sections:
    - name: corporate_press_releases
      section_title: "Caterpillar Corporate Press Releases"
      item_selector: "main li, [class*='list'] li, article"
      link_selector: "a[href*='/en/news/corporate-press-releases/']"
      title_selector: "h2, h3, a[href*='/en/news/corporate-press-releases/']"
      date_selector: "time, h4, [class*='date']"
      tags:
        - type: section
          name: corporate_press_releases
        - type: company
          name: caterpillar
        - type: language
          name: en

detail_page:
  title_selector: "h1"
  content_selector: "main, article, [class*='content']"
  date_selector: "time, main, [class*='date']"
  remove_selectors:
    - "script"
    - "style"
    - "nav"
    - "header"
    - "footer"
    - "[class*='share']"
    - "[class*='related']"
    - "[class*='dealer']"
    - "[class*='cookie']"

parse:
  date_format: "%B %d, %Y"
  timezone: America/Chicago
  max_articles_per_run: 20

cleaning:
  strip_html: true
  remove_blank_lines: true
  normalize_whitespace: true
  min_content_length: 50

tagging:
  enable_rule_tagger: true
  enable_llm_tagger: false
  allowed_tag_types:
    - country
    - company
    - shipowner
    - shipyard
    - engine_maker
    - vessel_type
    - fuel_type
    - regulator
    - term
    - language

summary:
  enable: true
  mode: rule

llm:
  provider: mock
  model: mock-llm
  base_url: http://mock-llm.local
  api_key_env: MOCK_LLM_API_KEY
  timeout: 10
