source:
  name: abb_cn_news_center
  url: https://new.abb.com
  type: html
  strategy: html
  status: enable

request:
  timeout: 45
  legacy_tls_compatibility: true
  use_playwright: true
  headers:
    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
    Accept-Language: zh-CN,zh;q=0.9,en;q=0.8

list_page:
  url: https://new.abb.com/cn/news-center
  sections:
    - name: news_center
      section_title: "News Center"
      # ABB 新闻中心存在动态加载，直接按详情链接抓候选，日期交由详情页提取
      item_selector: "a[href*='/news/'][href*='/detail/']"
      link_selector: "a[href*='/news/'][href*='/detail/']"
      title_selector: "a[href*='/news/'][href*='/detail/']"
      date_selector: null

detail_page:
  title_selector: "h1"
  content_selector: ".abb-section--article__body"
  date_selector: "time"
  remove_selectors:
    - "script"
    - "style"

parse:
  date_format: "%Y-%m-%d"
  timezone: UTC
  max_articles_per_run: 5

cleaning:
  strip_html: true
  remove_blank_lines: true
  normalize_whitespace: true
  min_content_length: 120

tagging:
  enable_rule_tagger: true
  enable_llm_tagger: false
  allowed_tag_types:
    - country
    - company
    - shipowner
    - shipyard
    - engine_maker
    - vessel_type
    - fuel_type
    - regulator
    - term

summary:
  enable: true
  mode: rule

llm:
  provider: mock
  model: mock-llm
  base_url: http://mock-llm.local
  api_key_env: MOCK_LLM_API_KEY
  timeout: 10
