source:
  name: maritimepropulsion
  url: https://www.maritimepropulsion.com
  type: html
  strategy: html
  status: enable

request:
  timeout: 20
  headers:
    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
    Accept-Language: en-US,en;q=0.9

list_page:
  url: https://www.maritimepropulsion.com/
  sections:
    - name: latest_news
      section_title: "Latest News"
      item_selector: ".top-news li"
      link_selector: "a[href*='/news/'][href*='-']"
      title_selector: "a[href*='/news/'][href*='-']"
      date_selector: ".missing-date"
      tags:
        - type: section
          name: latest_news

detail_page:
  title_selector: "h1"
  content_selector: "main, article, .content, .entry-content, .article-body"
  date_selector: "p.meta span.date"
  remove_selectors:
    - "script"
    - "style"
    - "nav"
    - "header"
    - "footer"

parse:
  date_format: "%B %d, %Y"
  timezone: UTC
  max_articles_per_run: 10

cleaning:
  strip_html: true
  remove_blank_lines: true
  normalize_whitespace: true
  min_content_length: 40

tagging:
  enable_rule_tagger: true
  enable_llm_tagger: false
  allowed_tag_types:
    - country
    - company
    - shipowner
    - shipyard
    - engine_maker
    - vessel_type
    - fuel_type
    - regulator
    - term

summary:
  enable: true
  mode: rule

llm:
  provider: mock
  model: mock-llm
  base_url: http://mock-llm.local
  api_key_env: MOCK_LLM_API_KEY
  timeout: 10
