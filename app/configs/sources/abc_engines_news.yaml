# Anglo Belgian Corporation news. The design URL points to an anchor on a market
# page, while the news pages currently present a verification page to local
# Playwright. Keep disabled until a stable crawl path is available.
source:
  name: abc_engines_news
  url: https://www.abc-engines.com
  type: html
  strategy: html
  status: disable

request:
  timeout: 45
  use_playwright: true
  headers:
    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
    Accept-Language: en-US,en;q=0.9,nl;q=0.8

list_page:
  url: https://www.abc-engines.com/en/news
  sections:
    - name: news_events
      section_title: "ABC Engines News"
      item_selector: "article, [class*='card'], [class*='news']"
      link_selector: "a[href*='/en/news/']"
      title_selector: "h2, h3, a[href*='/en/news/']"
      date_selector: "time, .date, [class*='date']"
      tags:
        - type: section
          name: news_events
        - type: company
          name: abc_engines
        - type: engine_maker
          name: abc
        - type: language
          name: en

detail_page:
  title_selector: "h1"
  content_selector: "main, article, [class*='content']"
  date_selector: "time, .date, [class*='date'], main"
  remove_selectors:
    - "script"
    - "style"
    - "nav"
    - "header"
    - "footer"
    - "[class*='share']"
    - "[class*='related']"

parse:
  date_format: "%B %d, %Y"
  timezone: Europe/Brussels
  max_articles_per_run: 20

cleaning:
  strip_html: true
  remove_blank_lines: true
  normalize_whitespace: true
  min_content_length: 50

tagging:
  enable_rule_tagger: true
  enable_llm_tagger: false
  allowed_tag_types:
    - country
    - company
    - shipowner
    - shipyard
    - engine_maker
    - vessel_type
    - fuel_type
    - regulator
    - term
    - language

summary:
  enable: true
  mode: rule

llm:
  provider: mock
  model: mock-llm
  base_url: http://mock-llm.local
  api_key_env: MOCK_LLM_API_KEY
  timeout: 10
