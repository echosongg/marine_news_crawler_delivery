# HD Hyundai media hub. Local crawl attempts receive a CloudFront 403 even
# through Playwright; keep the config disabled until an allowlisted endpoint or
# credentials are available.
source:
  name: hd_media_hub
  url: https://www.hd.com
  type: html
  strategy: html
  status: disable

request:
  timeout: 45
  use_playwright: true
  headers:
    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
    Accept-Language: en-US,en;q=0.9

list_page:
  url: https://www.hd.com/en/newsroom/media-hub/press/list
  sections:
    - name: press_releases
      section_title: "HD Hyundai Press Releases"
      item_selector: "li, article, [class*='list'] [class*='item']"
      link_selector: "a[href*='/en/newsroom/media-hub/press/view'], a[href*='detailsKey']"
      title_selector: "a[href*='/en/newsroom/media-hub/press/view'], a[href*='detailsKey']"
      date_selector: "time, .date, [class*='date']"
      tags:
        - type: section
          name: press_releases
        - type: company
          name: hd_hyundai
        - type: language
          name: en

detail_page:
  title_selector: "h1"
  content_selector: "main, article, [class*='content'], [class*='view']"
  date_selector: "time, .date, [class*='date']"
  remove_selectors:
    - "script"
    - "style"
    - "nav"
    - "header"
    - "footer"
    - "[class*='share']"
    - "[class*='related']"

parse:
  date_format: "%Y-%m-%d"
  timezone: Asia/Seoul
  max_articles_per_run: 20

cleaning:
  strip_html: true
  remove_blank_lines: true
  normalize_whitespace: true
  min_content_length: 50

tagging:
  enable_rule_tagger: true
  enable_llm_tagger: false
  allowed_tag_types:
    - country
    - company
    - shipowner
    - shipyard
    - engine_maker
    - vessel_type
    - fuel_type
    - regulator
    - term
    - language

summary:
  enable: true
  mode: rule

llm:
  provider: mock
  model: mock-llm
  base_url: http://mock-llm.local
  api_key_env: MOCK_LLM_API_KEY
  timeout: 10
