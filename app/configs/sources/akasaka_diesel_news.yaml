# Akasaka Diesels English news releases.
source:
  name: akasaka_diesel_news
  url: https://www.akasaka-diesel.jp
  type: html
  strategy: html
  status: enable

request:
  timeout: 25
  headers:
    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
    Accept-Language: en-US,en;q=0.9,ja;q=0.8

list_page:
  url: https://www.akasaka-diesel.jp/en-us/news/
  sections:
    - name: news_release
      section_title: "Akasaka Diesels News Release"
      item_selector: "article"
      link_selector: "a[href*='/en-us/']"
      title_selector: "h2, h3, a[href*='/en-us/']"
      date_selector: ".date, .entry-date, time"
      tags:
        - type: section
          name: news_release
        - type: company
          name: akasaka_diesels
        - type: engine_maker
          name: akasaka
        - type: language
          name: en

detail_page:
  title_selector: "article h1, main h1"
  content_selector: "article, main"
  date_selector: ".date, article, main"
  remove_selectors:
    - "script"
    - "style"
    - "nav"
    - "header"
    - "footer"
    - ".breadcrumb"
    - ".post-navigation"
    - ".related"

parse:
  date_format: "%b %d, %Y"
  timezone: Asia/Tokyo
  max_articles_per_run: 20

cleaning:
  strip_html: true
  remove_blank_lines: true
  normalize_whitespace: true
  min_content_length: 30

tagging:
  enable_rule_tagger: true
  enable_llm_tagger: false
  allowed_tag_types:
    - country
    - company
    - shipowner
    - shipyard
    - engine_maker
    - vessel_type
    - fuel_type
    - regulator
    - term
    - language

summary:
  enable: true
  mode: rule

llm:
  provider: mock
  model: mock-llm
  base_url: http://mock-llm.local
  api_key_env: MOCK_LLM_API_KEY
  timeout: 10
