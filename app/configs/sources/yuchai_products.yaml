# ============================================================
# yuchaiglobal.com — Yuchai Product Catalog
# https://www.yuchaiglobal.com/products/
#
# 注意：www.yuchai.com（中文主站）的产品页面全部由 JavaScript 渲染，
#       无法直接抓取产品规格。本配置改用玉柴国际站（yuchaiglobal.com），
#       该站使用 WooCommerce 构建，产品详情以静态 HTML 提供，涵盖：
#       - 产品简介（功率范围、应用领域）
#       - 产品特点（技术优势列表）
#       - 技术参数表（排量、缸径、功率、扭矩、排放标准等）
#
# 产品目录几乎不更新，建议手动运行，默认跳过常规批量抓取。
# 按产品大类分 section，各 section 使用相同选择器，仅 URL/标签不同。
# 每 section 设 limit=20，确保单次不过载。
# ============================================================

source:
  name: yuchai_products
  url: https://www.yuchaiglobal.com
  type: html
  strategy: html
  status: enable

request:
  timeout: 30
  # yuchaiglobal.com 使用旧式 TLS 握手，需关闭严格 SSL 验证
  legacy_tls_compatibility: true
  headers:
    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
    Accept-Language: en-US,en;q=0.9

list_page:
  # ─── 公共选择器说明 ────────────────────────────────────────────
  # 分类页（/product-category/…）使用 Elementor Loop 模板，结构如下：
  #   <div class="e-loop-item e-loop-item-XXXX post-XXXX product ...">
  #     <h2 class="product_title entry-title elementor-heading-title">
  #       <a href="/product/yc6mk-2/">YC6MK</a>
  #     </h2>
  #     <div class="elementor-button-wrapper">
  #       <a href="/product/yc6mk-2/">More Detail</a>
  #     </div>
  #   </div>
  # 注意：全量列表页（/products/）使用 li.product 结构，但分类页不同；
  #       统一使用 e-loop-item 选择器覆盖所有分类页。
  # ──────────────────────────────────────────────────────────────
  url: https://www.yuchaiglobal.com/products/
  sections:
    # ── 1. 卡车发动机 ──────────────────────────────────────────
    - name: truck_engines
      section_title: "Truck Engines"
      url: "https://www.yuchaiglobal.com/product-category/engine/truck-engine/"
      # Elementor Loop 模板：每张产品卡片是 div.e-loop-item
      item_selector: "div.e-loop-item"
      # 产品标题链接在 h2.product_title > a
      link_selector: "h2.product_title a"
      title_selector: "h2.product_title"
      date_selector: null          # 产品目录无发布日期，回退到抓取当日
      tags:
        - type: section
          name: truck_engines
        - type: content_type
          name: product
        - type: product_category
          name: engine

    # ── 2. 客车发动机 ──────────────────────────────────────────
    - name: bus_engines
      section_title: "Bus Engines"
      url: "https://www.yuchaiglobal.com/product-category/engine/bus-engine/"
