detail_page:
  # ─── 详情页结构（Elementor + WooCommerce 混合渲染） ──────────
  # <h1>YC6MK</h1>
  # <div class="woocommerce-product-details__short-description">
  #   Power range: 300-420 hp  Applications: ...
  # </div>
  # Elementor widget containers 包含：
  #   - Product Feature（编号列表：1.技术领先性 2.广泛应用...）
  #   - Product Parameters（规格参数表：排量/缸径/功率/扭矩/排放等）
  #   - 图标块：STRONG POWER / FUEL ECONOMY / RELIABILITY / COMFORT
  # ──────────────────────────────────────────────────────────────
  title_selector: "h1"
  # 以完整产品 div 作为内容来源，再通过 remove_selectors 去除噪音
  content_selector: "div.product.type-product"
  # 产品页无发布日期，使用不存在的选择器让 connector 回退到今日日期
  date_selector: "time.product-publish-date"
  remove_selectors:
    - "script"
    - "style"
    - "header"
    - "footer"
    - "nav"
    # WooCommerce/Elementor 页面噪音
    - ".elementor-widget-woocommerce-breadcrumb"   # 面包屑：HOME / Engine / ... / YC6MK
    - ".elementor-widget-button"                   # "Get Quote >" 按钮
    - ".elementor-widget-image"                    # 产品图片
    - ".elementor-widget-search"                   # 搜索框
    - ".elementor-widget-nav-menu"                 # 顶部导航菜单
    - ".elementor-widget-html"                     # 嵌入 JS 小部件
    - "form"                                       # 询价表单
    - ".quantity"                                  # 数量选择器
    - ".contact-form"                              # 联系表单
    - ".elementor-widget-shortcode"                # WP shortcode 区块

parse:
  # 产品页无日期，date_selector 返回空后 connector 自动使用今日日期
  date_format: "%Y-%m-%d"
  timezone: Asia/Shanghai
  max_articles_per_run: 300    # 15 sections × 20 items，全量扫描上限

cleaning:
  strip_html: true
  remove_blank_lines: true
  normalize_whitespace: true
  min_content_length: 50       # 过滤掉无内容的占位条目

tagging:
  enable_rule_tagger: true
  enable_llm_tagger: false
  allowed_tag_types:
    - company
    - engine_maker
    - vessel_type
    - fuel_type
    - term

summary:
  enable: true
  mode: rule

llm:
  provider: mock
  model: mock-llm
  base_url: http://mock-llm.local
  api_key_env: MOCK_LLM_API_KEY
  timeout: 10
