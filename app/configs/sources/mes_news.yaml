# Mitsui E&S English news. The public pages are visible from search/browser
# infrastructure but return Access Denied from this crawler environment, so the
# source is configured but disabled.
source:
  name: mes_news
  url: https://www.mes.co.jp
  type: html
  strategy: html
  status: disable

request:
  timeout: 45
  use_playwright: true
  headers:
    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
    Accept-Language: en-US,en;q=0.9,ja;q=0.8

list_page:
  url: https://www.mes.co.jp/en/news/2026/
  sections:
    - name: current_year
      section_title: "Mitsui E&S News"
      item_selector: "main a[href*='/en/news/'], main a[href$='.pdf']"
      link_selector: "a[href]"
      tags:
        - type: section
          name: current_year
        - type: company
          name: mitsui_es
        - type: language
          name: en

detail_page:
  title_selector: "h1"
  content_selector: "main, article, [class*='content']"
  date_selector: "main, time, .date, [class*='date']"
  remove_selectors:
    - "script"
    - "style"
    - "nav"
    - "header"
    - "footer"
    - ".breadcrumb"
    - "[class*='share']"
    - "[class*='related']"

parse:
  date_format: "%B %d, %Y"
  timezone: Asia/Tokyo
  max_articles_per_run: 30

cleaning:
  strip_html: true
  remove_blank_lines: true
  normalize_whitespace: true
  min_content_length: 50

tagging:
  enable_rule_tagger: true
  enable_llm_tagger: false
  allowed_tag_types:
    - country
    - company
    - shipowner
    - shipyard
    - engine_maker
    - vessel_type
    - fuel_type
    - regulator
    - term
    - language

summary:
  enable: true
  mode: rule

llm:
  provider: mock
  model: mock-llm
  base_url: http://mock-llm.local
  api_key_env: MOCK_LLM_API_KEY
  timeout: 10
