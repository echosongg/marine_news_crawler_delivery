# Kawasaki Heavy Industries newsroom. The homepage mixes HTML releases and
# direct PDF releases; both are supported by HTMLConnector.
source:
  name: kawasaki_newsroom
  url: https://global.kawasaki.com
  type: html
  strategy: html
  status: enable

request:
  timeout: 30
  headers:
    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
    Accept-Language: en-US,en;q=0.9,ja;q=0.8

list_page:
  url: https://global.kawasaki.com/en/corp/newsroom/index.html
  sections:
    - name: news_events
      section_title: "Kawasaki News & Events"
      item_selector: ".row.carousel .col_1of4"
      link_selector: "a[href*='/newsroom/news/detail/'], a[href$='.pdf']"
      title_selector: "a[href]"
      date_selector: "a[href]"
      tags:
        - type: section
          name: news_events
        - type: company
          name: kawasaki_heavy_industries
        - type: language
          name: en

detail_page:
  title_selector: "h1"
  content_selector: "article, main, #contentsArea"
  date_selector: ".date, article, main"
  remove_selectors:
    - "script"
    - "style"
    - "nav"
    - "header"
    - "footer"
    - ".breadcrumb"
    - ".sns"
    - ".related"

parse:
  date_format: "%b. %d, %Y"
  timezone: Asia/Tokyo
  max_articles_per_run: 30

cleaning:
  strip_html: true
  remove_blank_lines: true
  normalize_whitespace: true
  min_content_length: 50

tagging:
  enable_rule_tagger: true
  enable_llm_tagger: false
  allowed_tag_types:
    - country
    - company
    - shipowner
    - shipyard
    - engine_maker
    - vessel_type
    - fuel_type
    - regulator
    - term
    - language

summary:
  enable: true
  mode: rule

llm:
  provider: mock
  model: mock-llm
  base_url: http://mock-llm.local
  api_key_env: MOCK_LLM_API_KEY
  timeout: 10
