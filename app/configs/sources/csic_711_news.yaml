source:
  name: csic_711_news
  url: http://www.csic-711.com
  type: html
  strategy: html
  status: enable

request:
  timeout: 20
  headers:
    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
    Accept-Language: zh-CN,zh;q=0.9,en;q=0.8

list_page:
  # 以科研动态页作为根入口；各 section 使用独立 URL
  url: http://www.csic-711.com/index.php?c=category&id=4
  sections:
    # 公司新闻
    - name: company_news
      section_title: "公司新闻"
      url: http://www.csic-711.com/index.php?c=category&id=3
      item_selector: "div.right div.text div.title"
      link_selector: "a[href*='index.php?c=show&id='], a[href*='/index.php?c=show&id=']"
      title_selector: "a"
      # 列表页日期与标题不在同一 item 中，使用详情页更新时间兜底
      date_selector: "time.nonexistent"
      tags:
        - type: section
          name: company_news
        - type: company
          name: 中国船舶集团第七一一研究所

    # 科研动态
    - name: research_updates
      section_title: "科研动态"
      url: http://www.csic-711.com/index.php?c=category&id=4
      item_selector: "div.right div.text div.title"
      link_selector: "a[href*='index.php?c=show&id='], a[href*='/index.php?c=show&id=']"
      title_selector: "a"
      date_selector: "time.nonexistent"
      tags:
        - type: section
          name: research_updates
        - type: company
          name: 中国船舶集团第七一一研究所

detail_page:
  title_selector: "div.newstitle"
  content_selector: "div.newscontent"
  # 详情页日期示例：更新时间：2026-03-03
  date_selector: "div.resource"
  remove_selectors:
    - "script"
    - "style"
    - "nav"
    - "header"
    - "footer"

parse:
  date_format: "%Y-%m-%d"
  timezone: Asia/Shanghai
  max_articles_per_run: 30

cleaning:
  strip_html: true
  remove_blank_lines: true
  normalize_whitespace: true
  min_content_length: 80

tagging:
  enable_rule_tagger: true
  enable_llm_tagger: false
  allowed_tag_types:
    - company
    - shipyard
    - fuel_type
    - regulator
    - term

summary:
  enable: true
  mode: rule

llm:
  provider: mock
  model: mock-llm
  base_url: http://mock-llm.local
  api_key_env: MOCK_LLM_API_KEY
  timeout: 10
