source:
  name: wartsila_cision
  url: https://news.cision.com/wartsila-corporation
  type: html
  strategy: html
  status: enable

request:
  timeout: 30
  headers:
    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
    Accept-Language: en-US,en;q=0.9

list_page:
  url: https://news.cision.com/wartsila-corporation
  sections:
    - name: releases
      section_title: "Wartsila Cision Releases"
      url: https://news.cision.com/wartsila-corporation
      item_selector: "div.card-item.span3 article"
      link_selector: "a[href*='/wartsila-corporation/r/']"
      title_selector: "h2"
      date_selector: "time"
      tags:
        - type: section
          name: releases
        - type: company
          name: wartsila

detail_page:
  title_selector: "div.release-item-details h1, h1"
  content_selector: "div.release-item-details article"
  date_selector: "div.release-item-details time, time"
  remove_selectors:
    - "div.share"
    - ".social-link"
    - "script"
    - "style"

parse:
  date_format: "%a, %b %d, %Y %H:%M CET"
  timezone: Europe/Helsinki
  max_articles_per_run: 30

cleaning:
  strip_html: true
  remove_blank_lines: true
  normalize_whitespace: true
  min_content_length: 100

tagging:
  enable_rule_tagger: true
  enable_llm_tagger: false
  allowed_tag_types:
    - country
    - company
    - shipowner
    - shipyard
    - engine_maker
    - vessel_type
    - fuel_type
    - regulator
    - term

summary:
  enable: true
  mode: rule

llm:
  provider: mock
  model: mock-llm
  base_url: http://mock-llm.local
  api_key_env: MOCK_LLM_API_KEY
  timeout: 10
