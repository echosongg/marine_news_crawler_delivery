# ============================================================
# xindemarinenews.com — 航情市场专项配置
# https://www.xindemarinenews.com
#
# 本配置抓取信德海事网航情（/market/）频道下的 4 个子栏目：
#   - market_daily   每日简讯/航情观察  /market/hangqingguancha/
#   - market_report  市场交易/报告      /market/shichangjiaoyi/
#   - market_safety  海事安全周报       /market/haishizhoubao/
#   - market_green   绿色洞察           /market/lvsedongcha/
#
# 综合高频新闻（国内、国际、活动）见 xindemarinenews.yaml。
#
# 反爬说明：
#   市场子频道列表（<ul class="first">）通过 AJAX 异步加载，
#   静态 HTML 中 ul.first 为空。必须启用 Playwright（use_playwright: true）
#   使浏览器执行 JavaScript 后再提取文章列表。
#
# 航情文章 URL 格式（含日期路径，DedeCMS 分类树结构）：
#   /market/{subsection}/{year}/{mmdd}/{id}.html
#   例：/market/haishizhoubao/2026/0413/63402.html
#
# 列表页 HTML 结构（JS 渲染后，.text_img_list > ul.first）：
#   经 Playwright 执行 JS 后，ul.first 填充为文章卡片列表，
#   典型 DedeCMS 子频道卡片结构（含图片、标题、时间）：
#   <ul class="first">
#     <li>
#       <a href="/market/{sub}/{year}/{mmdd}/{id}.html">
#         <img src="..." alt="文章标题" />
#         <p class="title">文章标题</p>
#         <p class="time">2026-04-13</p>
#       </a>
#     </li>
#     ...
#   </ul>
#   注：若 Playwright 后 ul.first 仍为空，请检查页面 JS 是否有反爬机制，
#       可通过浏览器 Network 面板追踪 XHR 请求，改为直接调用 API。
#
# 详情页 HTML 结构（与 xindemarinenews.yaml 相同 DedeCMS 模板）：
#   <div class="J-title_detail title_detail">
#     <h1><span>文章标题</span></h1>
#   </div>
#   <div class='share_cnt_p'> <i>2026-04-14 17:45</i>来源：<i>信德海事网</i>
#   <div class="J-contain_detail_cnt contain_detail_cnt">正文...</div>
# ============================================================

source:
  name: xindemarinenews_market
  url: https://www.xindemarinenews.com
  type: news
  strategy: html
  status: enable

request:
  timeout: 45
  use_playwright: true          # 市场子频道列表通过 AJAX 加载，必须启用 Playwright
  headers:
    User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36"
    Accept-Language: "zh-CN,zh;q=0.9,en;q=0.8"
    Referer: "https://www.xindemarinenews.com/market/"

list_page:
  url: https://www.xindemarinenews.com/market/
  sections:
    # ── 1. 每日简讯/航情观察 ────────────────────────────────────────────────────
    # 每日市场行情综述、租船市场简报、各船型运价动态
    # 文章 URL 格式：/market/hangqingguancha/{year}/{mmdd}/{id}.html
    # - name: market_daily
    #   section_title: "每日简讯/航情观察"
    #   url: https://www.xindemarinenews.com/market/hangqingguancha/
    #   # JS 渲染后文章列表填充进 .text_img_list ul.first 中
    #   item_selector: ".text_img_list ul.first li"
    #   link_selector: "a[href]"
    #   # 标题位于 <p class="text_title"><a><b>...</b></a></p>
    #   title_selector: "p.text_title a, .text_title a"
    #   # 列表卡片通常不含独立日期，回退到详情页 .share_cnt_p i
    #   date_selector: "time.nonexistent"
    #   tags:
    #     - type: source_section
    #       name: market_daily
    #     - type: term
    #       name: market
    #     - type: language
    #       name: zh

    # ── 2. 市场交易/报告 ────────────────────────────────────────────────────────
    # 二手船成交、新造船签单、期租市场、货运市场、各船型价格动态报告
    # 文章 URL 格式：/market/shichangjiaoyi/{year}/{mmdd}/{id}.html
    # 更新频率：每周 3–7 篇
    - name: market_report
      section_title: "市场交易/报告"
      url: https://www.xindemarinenews.com/market/shichangjiaoyi/
      item_selector: ".text_img_list ul.first li"
      link_selector: "a[href]"
      title_selector: "p.text_title a, .text_title a"
      date_selector: "time.nonexistent"
      tags:
        - type: source_section
          name: market_report
        - type: term
          name: market
        - type: language
          name: zh

    # ── 3. 海事安全周报 ─────────────────────────────────────────────────────────
    # 每周一期，汇总全球海事安全事故、险情分析，含详细图文报道
    # 文章 URL 格式：/market/haishizhoubao/{year}/{mmdd}/{id}.html
    # 更新频率：每周 1 篇（每周发布一期安全周报）
    - name: market_safety
      section_title: "海事安全周报"
      url: https://www.xindemarinenews.com/market/haishizhoubao/
      item_selector: ".text_img_list ul.first li"
      link_selector: "a[href]"
      title_selector: "p.text_title a, .text_title a"
      date_selector: "time.nonexistent"
      tags:
        - type: source_section
          name: market_safety
        - type: term
          name: safety
        - type: language
          name: zh

    # ── 4. 绿色洞察 ─────────────────────────────────────────────────────────────
    # 绿色航运、碳减排、替代燃料、环保法规等专题分析文章
    # 文章 URL 格式：/market/lvsedongcha/{year}/{mmdd}/{id}.html
    # 更新频率：每周 1–3 篇
    # - name: market_green
    #   section_title: "绿色洞察"
    #   url: https://www.xindemarinenews.com/market/lvsedongcha/
    #   item_selector: ".text_img_list ul.first li"
    #   link_selector: "a[href]"
    #   title_selector: "p.text_title a, .text_title a"
    #   date_selector: "time.nonexistent"
    #   tags:
    #     - type: source_section
    #       name: market_green
    #     - type: term
    #       name: green_shipping
    #     - type: language
    #       name: zh

detail_page:
  # 与 xindemarinenews.yaml 相同的 DedeCMS 详情页模板
  title_selector: ".title_detail h1"
  content_selector: ".contain_detail_cnt"
  date_selector: ".share_cnt_p i"
  remove_selectors:
    - "script"
    - "style"
    - "nav"
    - "header"
    - "footer"
    - "h1"
    - ".discuss-wrap"
    - ".social-share"
    - ".gg_detail_cnt"
    - ".gg_item_bomttom_cnt"
    - ".ggPic_item_bomttom_cnt"
    - ".pagination"
    - ".guess_like"
    - ".related-news"
    - "#artical_relatednews"
    - ".bk3"
    - ".shop_guide"
    - "[class*='couplet_ad']"

parse:
  # 详情页日期格式：2026-04-14 17:45
  date_format: "%Y-%m-%d %H:%M"
  timezone: Asia/Shanghai
  max_articles_per_run: 20

cleaning:
  strip_html: true
  remove_blank_lines: true
  normalize_whitespace: true
  min_content_length: 80

tagging:
  enable_rule_tagger: true
  enable_llm_tagger: false
  allowed_tag_types:
    - country
    - company
    - shipowner
    - shipyard
    - vessel_type
    - fuel_type
    - regulator
    - term

summary:
  enable: true
  mode: rule

llm:
  provider: mock
  model: mock-llm
  base_url: http://mock-llm.local
  api_key_env: MOCK_LLM_API_KEY
  timeout: 10
